<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ======= RESET ======= */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* Fallback if theme JS fails */
            background: radial-gradient(1200px 800px at 50% 20%, #0b1020 0%, #060609 55%, #050507 100%);
            position: fixed;
            inset: 0;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ======= BACKGROUND LAYERS ======= */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-base { background: var(--bg-gradient); }
        .bg-orbs { background: var(--bg-orbs); }

        /* Subtle grid: adds depth without looking busy */
        .bg-grid {
            opacity: 0.10;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 80px 80px;
            mix-blend-mode: overlay;
        }

        .bg-noise {
            opacity: 0.012;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* ======= GLASS CONTAINER ======= */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 52px;
            /* Glass with subtle tint so it feels integrated with the gradient */
            background: rgba(10, 10, 18, 0.52);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            max-width: 98vw;
            max-height: 96vh;
            overflow: hidden;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.62);
            letter-spacing: 2px;
            margin-bottom: 32px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.55);
        }

        .calendar-grid {
            display: flex;
            flex-direction: column;
            gap: var(--row-gap, 16px);
            width: 100%;
        }

        .month-row {
            display: flex;
            align-items: center;
            gap: var(--label-gap, 20px);
            justify-content: flex-start;
            width: 100%;
        }

        .month-label {
            width: var(--label-width, 85px);
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--label-font, 10px);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.50);
            text-align: right;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.45);
        }

        .days-container {
            display: flex;
            gap: var(--dot-gap, 6px);
            flex-wrap: nowrap;
            align-items: center;
        }

        /* ======= DOT STYLES — CLEAN & MINIMAL ======= */
        .dot {
            width: var(--dot-size, 18px);
            height: var(--dot-size, 18px);
            border-radius: var(--dot-radius, 3px);
            position: relative;
            flex-shrink: 0;
        }

        .dot.filled {
            background: var(--dot-color);
        }

        .dot.empty {
            background: rgba(255, 255, 255, 0.055);
        }

        .dot.today {
            background: var(--today-color);
            box-shadow: 0 0 0 1.5px rgba(var(--today-rgb), 0.32);
            transform: scale(1.04);
            border-radius: calc(var(--dot-radius, 4px) + 1px);
        }

        .dot.disabled {
            background: rgba(255, 255, 255, 0.012);
            opacity: 0.35;
        }

        /* ======= PROGRESS BAR ======= */
        .progress-wrapper {
            width: 100%;
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            width: 100%;
            max-width: 500px;
            height: 3px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress-gradient);
            border-radius: 2px;
        }

        .footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.46);
            letter-spacing: 1px;
            margin-top: 8px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.55);
        }

        .footer span {
            color: var(--accent-color);
            font-weight: 500;
        }

        /* ======= RESPONSIVE: TABLET ======= */
        @media (max-width: 768px) {
            .container {
                padding: 22px 16px;
                border-radius: 14px;
            }
            .title {
                font-size: 13px;
                letter-spacing: 1.4px;
                margin-bottom: 20px;
            }
            .footer { font-size: 11px; letter-spacing: 0.7px; }
        }

        /* ======= RESPONSIVE: MOBILE ======= */
        @media (max-width: 480px) {
            .container {
                padding: 14px 8px;
                border-radius: 10px;
            }
            .title {
                font-size: 12px;
                margin-bottom: 14px;
                letter-spacing: 1.1px;
            }
            .progress-wrapper { margin-top: 14px; gap: 6px; }
            .progress-bar { height: 2px; }
            .footer { font-size: 10px; }
        }

        /* ======= RESPONSIVE: SMALL PHONE ======= */
        @media (max-width: 400px) {
            .container {
                padding: 10px 5px;
                border-radius: 8px;
            }
            .title {
                font-size: 11px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body style="background: #060609 !important;">
    <div class="bg-layer bg-base"></div>
    <div class="bg-layer bg-orbs"></div>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-noise"></div>

    <div class="container">
        <h1 class="title" id="title">180 Days</h1>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="footer" id="footer"></div>
        </div>
    </div>

    <script>
        // =========================================================
        // RANDOM COLOR THEME — fresh unique palette every request
        // Dark-based design with muted, sophisticated dot colors
        // Uses seeded RNG to ensure unique colors per request
        // =========================================================

        function generateTheme() {
            function randUnit() {
                if (window.crypto && window.crypto.getRandomValues) {
                    const arr = new Uint32Array(1);
                    window.crypto.getRandomValues(arr);
                    return arr[0] / 4294967296;
                }
                return Math.random();
            }
            function pick(list) {
                return list[Math.floor(randUnit() * list.length)];
            }
            function hexToRgbString(hexColor) {
                return hexColor
                    .replace('#', '')
                    .match(/.{2}/g)
                    .map((v) => parseInt(v, 16))
                    .join(', ');
            }

            const palettes = [
                {
                    bgGradient: 'linear-gradient(145deg, #111b3a 0%, #0b132a 36%, #09101f 72%, #070b15 100%)',
                    bgOrbs: 'radial-gradient(60% 45% at 22% 26%, rgba(106,159,255,0.20) 0%, transparent 62%), radial-gradient(55% 40% at 80% 72%, rgba(72,230,214,0.16) 0%, transparent 64%)',
                    filled: ['#78a6ff', '#7394ff', '#6ad9d4', '#6f8fd8'],
                    today: '#8ec5ff',
                },
                {
                    bgGradient: 'linear-gradient(145deg, #1e162f 0%, #171126 36%, #120d1d 70%, #0d0a15 100%)',
                    bgOrbs: 'radial-gradient(62% 48% at 20% 28%, rgba(165,127,255,0.20) 0%, transparent 62%), radial-gradient(58% 42% at 78% 70%, rgba(255,140,186,0.14) 0%, transparent 64%)',
                    filled: ['#9f8cff', '#c18fff', '#e48cb8', '#8ca7ff'],
                    today: '#d1adff',
                },
                {
                    bgGradient: 'linear-gradient(145deg, #0f2730 0%, #0c1f27 34%, #0a171e 70%, #081116 100%)',
                    bgOrbs: 'radial-gradient(62% 46% at 22% 26%, rgba(85,210,215,0.20) 0%, transparent 62%), radial-gradient(56% 40% at 80% 72%, rgba(100,160,255,0.16) 0%, transparent 64%)',
                    filled: ['#67d2d7', '#67b8e8', '#6ea6ff', '#4f9cc0'],
                    today: '#84e2ef',
                },
                {
                    bgGradient: 'linear-gradient(145deg, #2a1b12 0%, #1f150f 38%, #17100d 72%, #100b09 100%)',
                    bgOrbs: 'radial-gradient(62% 48% at 20% 28%, rgba(255,168,105,0.20) 0%, transparent 62%), radial-gradient(58% 42% at 82% 70%, rgba(255,209,99,0.14) 0%, transparent 64%)',
                    filled: ['#ffb96e', '#ff9f71', '#ffd36b', '#f3a86c'],
                    today: '#ffd89a',
                },
                {
                    bgGradient: 'linear-gradient(145deg, #122717 0%, #0f2014 36%, #0c1911 70%, #09130d 100%)',
                    bgOrbs: 'radial-gradient(60% 46% at 22% 26%, rgba(100,220,160,0.20) 0%, transparent 62%), radial-gradient(56% 40% at 80% 72%, rgba(79,184,222,0.15) 0%, transparent 64%)',
                    filled: ['#74dca8', '#5fd6ba', '#63bde7', '#90cd7a'],
                    today: '#9be7b7',
                },
            ];

            const palette = pick(palettes);
            const filled = palette.filled.map((color) => ({ hex: color, rgb: hexToRgbString(color) }));
            const todayRgb = hexToRgbString(palette.today);

            return {
                bgGradient: palette.bgGradient,
                bgOrbs: palette.bgOrbs,
                filled: filled,
                today: { hex: palette.today, rgb: todayRgb },
                accent: `rgba(${todayRgb}, 0.78)`,
                progressGradient: `linear-gradient(90deg, ${palette.filled[0]}, ${palette.filled[1]})`,
            };
        }

        // =========================================================
        // RESPONSIVE DOT SIZING — optimized for mobile clarity
        // =========================================================

        function computeDotSizing() {
            const vw = window.innerWidth;

            let containerPad, labelWidth, labelGap, dotGap, rowGap;

            if (vw <= 400) {
                containerPad = 5 * 2;
                labelWidth = 42;
                labelGap = 3;
                dotGap = 1;
                rowGap = 6;
            } else if (vw <= 480) {
                containerPad = 8 * 2;
                labelWidth = 52;
                labelGap = 5;
                dotGap = 1;
                rowGap = 8;
            } else if (vw <= 768) {
                containerPad = 16 * 2;
                labelWidth = 60;
                labelGap = 12;
                dotGap = 3;
                rowGap = 12;
            } else {
                containerPad = 52 * 2;
                labelWidth = 85;
                labelGap = 20;
                dotGap = 6;
                rowGap = 16;
            }

            const availableForDots = vw - containerPad - labelWidth - labelGap - 6;
            const cellWidth = availableForDots / 31;
            let dotSize = Math.max(4, Math.floor(cellWidth - dotGap));
            dotSize = Math.min(dotSize, 20);
            const dotRadius = Math.max(2, Math.round(dotSize * 0.22));
            const labelFont = Math.max(9, Math.min(13, Math.round(dotSize * 0.68)));

            const root = document.documentElement;
            root.style.setProperty('--dot-size', dotSize + 'px');
            root.style.setProperty('--dot-gap', dotGap + 'px');
            root.style.setProperty('--dot-radius', dotRadius + 'px');
            root.style.setProperty('--label-width', labelWidth + 'px');
            root.style.setProperty('--label-gap', labelGap + 'px');
            root.style.setProperty('--label-font', labelFont + 'px');
            root.style.setProperty('--row-gap', rowGap + 'px');

            return { dotSize, dotGap, labelWidth };
        }

        // =========================================================
        // APPLY THEME + RENDER CALENDAR
        // =========================================================

        const theme = generateTheme();

        document.documentElement.style.setProperty('--bg-gradient', theme.bgGradient);
        document.documentElement.style.setProperty('--bg-orbs', theme.bgOrbs);
        document.documentElement.style.setProperty('--accent-color', theme.accent);
        document.documentElement.style.setProperty('--progress-gradient', theme.progressGradient);

        document.documentElement.style.background = '#060609';
        document.body.style.background = '#060609';

        computeDotSizing();

        // Calendar config (replaced by API for custom dates)
        const config = {
            yearStart: '2025-12-01',
            yearEnd: '2026-05-31',
            title: '180 DAYS'
        };

        const start = new Date(config.yearStart);
        start.setHours(0, 0, 0, 0);
        const end = new Date(config.yearEnd);
        end.setHours(23, 59, 59, 999);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Build months
        const months = [];
        let dateIter = new Date(start);
        while (dateIter <= end) {
            const y = dateIter.getFullYear();
            const m = dateIter.getMonth();
            const monthStart = new Date(y, m, 1);
            const monthEnd = new Date(y, m + 1, 0);
            const clampedStart = new Date(Math.max(monthStart, start));
            clampedStart.setHours(0, 0, 0, 0);
            const clampedEnd = new Date(Math.min(monthEnd, end));
            clampedEnd.setHours(23, 59, 59, 999);

            months.push({
                year: y, month: m,
                name: monthStart.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).toUpperCase(),
                days: monthEnd.getDate(),
                start: clampedStart, end: clampedEnd
            });
            dateIter = new Date(y, m + 1, 1);
        }

        // Progress
        const totalDays = Math.floor((end - start) / 86400000) + 1;
        const daysElapsed = Math.max(0, Math.min(totalDays, Math.floor((today - start) / 86400000) + 1));
        const daysLeft = totalDays - daysElapsed;
        const percent = Math.round((daysElapsed / totalDays) * 100);

        document.getElementById('footer').innerHTML =
            `<span>${daysLeft}</span> days left · <span>${percent}%</span> complete`;
        document.getElementById('title').textContent = config.title;
        document.getElementById('progressFill').style.width = `${percent}%`;

        // Render grid
        const grid = document.getElementById('calendarGrid');
        months.forEach(month => {
            const row = document.createElement('div');
            row.className = 'month-row';

            const label = document.createElement('div');
            label.className = 'month-label';
            label.textContent = month.name;
            row.appendChild(label);

            const days = document.createElement('div');
            days.className = 'days-container';

            for (let day = 1; day <= 31; day++) {
                const dayDate = new Date(month.year, month.month, day);
                dayDate.setHours(0, 0, 0, 0);

                if (day > month.days || dayDate < month.start || dayDate > month.end) {
                    const dot = document.createElement('div');
                    dot.className = 'dot disabled';
                    days.appendChild(dot);
                    continue;
                }

                const isFilled = dayDate <= today;
                const isToday = dayDate.getTime() === today.getTime();
                const weekGroup = Math.floor((day - 1) / 7) % 4;

                const dot = document.createElement('div');
                dot.className = `dot ${isFilled ? 'filled' : 'empty'} ${isToday ? 'today' : ''}`;

                if (isFilled && !isToday) {
                    dot.style.setProperty('--dot-color', theme.filled[weekGroup].hex);
                }

                if (isToday) {
                    dot.style.setProperty('--today-color', theme.today.hex);
                    dot.style.setProperty('--today-rgb', theme.today.rgb);
                }

                days.appendChild(dot);
            }

            row.appendChild(days);
            grid.appendChild(row);
        });
    </script>
</body>
</html>
